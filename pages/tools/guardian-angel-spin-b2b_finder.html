<!DOCTYPE html>

<head>
  <meta charset="utf-8">
  <title>Guardian Angel Spin B2B PC Finder</title>
  <script src="../../js/mino-board.js" type="text/javascript"></script>
  <script src="../../js/tetris-fumen.js" type="text/javascript"></script>
  <script src="../../js/pagestyling.js" type="text/javascript"></script>
  <link href='https://fonts.googleapis.com/css?family=Roboto Mono:400,700,i' rel='stylesheet'>
  <link href="../../css/openerpage.css" rel="stylesheet"></link>
  <script>let __LOAD = performance.now();</script>
</head>

<body>

<h1>Guardian Angel Spin PC Finder</h1>
<mino-board fumen="v115@pgQ4IeR4GeglwhQ4EeilwhCeAtDeg0whRpBtwwCeg0?whRpAtywAeh0JeAgH"></mino-board>
<mino-board fumen="v115@fgB8GeC8GeD8EeF8EeE8DeE8CeH8AeE8JeAgH"></mino-board>
	<br> Normal Side (J>L) <br>
<mino-board fumen="v115@ygAtg0GeBti0EeAtwhglDeQ4CewhglCewwR4Rpwhhl?AeywQ4RpwhJeAgH"></mino-board>
<mino-board fumen="v115@fgA8GeC8GeD8EeD8EeF8DeH8CeH8AeD8JeAgH"></mino-board>
	<br> Mirrored Side (L>J) <br>
	
<h2>Queue</h2>
	<input type="text" id="queueSearchInput" />
	<button type="button" onclick="queueSearch()">Queue Search</button>
	<button type="button" onclick="queueSearchMirrored()">Queue Search Mirrored</button>
	<br>
	Input a queue starting with the held T here to output all possible B2B Solves (eg. TILJOSZT). Click "Queue Search Mirrored" if your bag 1 was L>J.
    <br>
	
<div id="output"></div>

<script>
	let gaDataPromise = fetch("guardian-angel-allspin-b2b-cover.json").then(r => r.json());

	async function queueSearch()
	{
		let inputQueue = document.getElementById("queueSearchInput").value.toUpperCase().trim();
		const data = await gaDataPromise;
		const output = document.getElementById("output");
		output.innerHTML = "";

		const indices = data.queue_map[inputQueue];
		if (!indices) {
			output.textContent = "No data for queue: " + inputQueue;
			return;
		}
		if (indices.length === 0) {
			output.textContent = "No B2B solves found for this queue.";
			return;
		}

		for (const i of indices) {
			const board = document.createElement('mino-board');
			board.setAttribute('fumen', data.solutions[i]);
			output.appendChild(board);
			board.setup();
		}
	}

	async function queueSearchMirrored()
	{
		let inputQueue = document.getElementById("queueSearchInput").value.toUpperCase().trim();
		const data = await gaDataPromise;
		const output = document.getElementById("output");
		output.innerHTML = "";

		const indices = data.queue_map_mirror[inputQueue];
		if (!indices) {
			output.textContent = "No data for queue: " + inputQueue;
			return;
		}
		if (indices.length === 0) {
			output.textContent = "No B2B solves found for this queue.";
			return;
		}

		for (const i of indices) {
			const board = document.createElement('mino-board');
			board.setAttribute('fumen', data.solutions_mirror[i]);
			output.appendChild(board);
			board.setup();
		}
	}
</script>
<body>
